name: Docker Build

on:
  # PRs only validate that the Docker build still works.
  pull_request:
  # Branch pushes and version tags are the publish paths.
  push:
    branches:
      - master
      - development
      - release
    tags:
      - 'v*'
  # Manual runs are useful for debugging the pipeline on demand.
  workflow_dispatch:

env:
  # Image coordinates are assembled later as REGISTRY/NAMESPACE/NAME:TAG.
  REGISTRY: registry.sheldylew.com
  IMAGE_NAMESPACE: sheldylew
  IMAGE_NAME: registry-control-plane

jobs:
  docker-build:
    # Self-hosted runner with Docker available for buildx/bake.
    runs-on: docker-build

    steps:
      - name: Install checkout runtime dependencies
        # Forgejo checkout is a JS action, so required tools must exist before it runs.
        # Only install packages that are actually missing on the runner.
        run: |
          missing_packages=""
          command -v git >/dev/null 2>&1 || missing_packages="$missing_packages git"
          command -v node >/dev/null 2>&1 || missing_packages="$missing_packages nodejs"
          command -v bash >/dev/null 2>&1 || missing_packages="$missing_packages bash"
          command -v curl >/dev/null 2>&1 || missing_packages="$missing_packages curl"

          if [ -n "$missing_packages" ]; then
            apk add --no-cache $missing_packages
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Buildx builder
        shell: bash
        run: |
          set -euo pipefail

          # Reuse a named builder across runs when it already exists.
          if docker buildx inspect forgejo-builder >/dev/null 2>&1; then
            docker buildx use forgejo-builder
          else
            # Host networking avoids registry/network surprises inside the builder container.
            docker buildx create \
              --name forgejo-builder \
              --driver docker-container \
              --driver-opt network=host \
              --use
          fi

          # Ensure the builder is ready before any bake target runs.
          docker buildx inspect --bootstrap

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # PRs validate only. Everything else may publish if a registry is configured.
          publish="false"
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" && -n "${REGISTRY}" ]]; then
            publish="true"
          fi

          ref_name="${GITHUB_REF_NAME:-${GITHUB_SHA}}"
          ref="${GITHUB_REF:-}"
          image_tag_alt=""
          build_time="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          # Branches publish moving aliases; SemVer tags publish immutable versions.
          # Stable SemVer tags also get "latest". Any other ref falls back to a short SHA.
          case "${ref_name}" in
            master)
              image_tag="edge"
              ;;
            development)
              image_tag="nightly"
              ;;
            release)
              image_tag="release"
              ;;
            *)
              if [[ "${ref}" == refs/tags/v* ]]; then
                image_tag="${ref_name}"
                if [[ "${ref_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                  image_tag_alt="latest"
                fi
              else
                image_tag="${GITHUB_SHA::12}"
              fi
              ;;
          esac

          {
            echo "publish=${publish}"
            echo "image_prefix=${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
            echo "image_tag=${image_tag}"
            echo "image_tag_alt=${image_tag_alt}"
            echo "version=${ref_name}"
            echo "build_time=${build_time}"
          } >>"${GITHUB_OUTPUT}"

      - name: Install arm64 emulation
        if: steps.meta.outputs.publish == 'true'
        # Validation stays native-arch. Publish runs still need binfmt on amd64
        # runners so buildx can produce the arm64 images too.
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install arm64

      - name: Log in to registry
        if: steps.meta.outputs.publish == 'true'
        shell: bash
        env:
          # Keep credentials scoped to the one step that needs them.
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${REGISTRY_USERNAME}" || -z "${REGISTRY_TOKEN}" ]]; then
            echo "REGISTRY_USERNAME and REGISTRY_TOKEN secrets are required for publishing." >&2
            exit 1
          fi

          printf '%s' "${REGISTRY_TOKEN}" | docker login "${REGISTRY}" --username "${REGISTRY_USERNAME}" --password-stdin

      - name: Validate native-arch build
        if: steps.meta.outputs.publish != 'true'
        shell: bash
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            x86_64|amd64)
              platform="linux/amd64"
              ;;
            arm64|aarch64)
              platform="linux/arm64"
              ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          # Validation intentionally stays on the runner's native architecture.
          export REVISION="${GITHUB_SHA}"
          export VERSION="${GITHUB_REF_NAME:-${GITHUB_SHA}}"
          export BUILD_TIME="${{ steps.meta.outputs.build_time }}"
          export IMAGE_PREFIX="${{ steps.meta.outputs.image_prefix }}"
          export IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          export PLATFORM="${platform}"

          docker buildx bake --allow=fs=/tmp validate-native

      - name: Publish multi-arch images
        if: steps.meta.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Publish uses the same metadata plus version/revision labels for the pushed images.
          export REVISION="${GITHUB_SHA}"
          export VERSION="${{ steps.meta.outputs.version }}"
          export BUILD_TIME="${{ steps.meta.outputs.build_time }}"
          export IMAGE_PREFIX="${{ steps.meta.outputs.image_prefix }}"
          export IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          export IMAGE_TAG_ALT="${{ steps.meta.outputs.image_tag_alt }}"

          for target in api-publish auth-init-publish web-publish nginx-publish; do
            docker buildx bake --allow=fs=/tmp "${target}"
          done

      - name: Prune expired BuildKit cache
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          # Buildx exports cache here via docker-bake.hcl, so ensure the path exists.
          mkdir -p /tmp/buildkit-registry-control-plane

          # Run cleanup after the build so the current job gets the best cache hit rate.
          # Keep the local cache best-effort and bounded to ten days of age.
          docker buildx prune \
            --builder forgejo-builder \
            --filter until=240h \
            --force || true
