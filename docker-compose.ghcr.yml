# Simple public runtime for published GHCR images.
# nginx stays bound to localhost; put HTTPS in front before exposing it.
services:
  auth-init:
    image: ${RCP_IMAGE_PREFIX:-ghcr.io/sheldylew/registry-control-plane}-auth-init:${RCP_IMAGE_TAG:-release}
    user: "0:0"
    restart: "no"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - app-data:/data
      - registry-data:/var/lib/registry
      - auth-private-data:/auth-private
      - auth-public-data:/auth-public
      - registry-config-data:/registry-config

  api:
    image: ${RCP_IMAGE_PREFIX:-ghcr.io/sheldylew/registry-control-plane}-api:${RCP_IMAGE_TAG:-release}
    restart: unless-stopped
    environment:
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-*}
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - app-data:/data
      - registry-data:/var/lib/registry
      - auth-private-data:/run/auth-private:ro
      - auth-public-data:/run/auth-public:ro
      - registry-config-data:/etc/docker/registry
    depends_on:
      auth-init:
        condition: service_completed_successfully

  web:
    image: ${RCP_IMAGE_PREFIX:-ghcr.io/sheldylew/registry-control-plane}-web:${RCP_IMAGE_TAG:-release}
    restart: unless-stopped
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  registry:
    image: registry:2.8.3
    restart: unless-stopped
    user: "10001:10001"
    volumes:
      - registry-data:/var/lib/registry
      - registry-config-data:/etc/docker/registry:ro
      - auth-public-data:/certs:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    depends_on:
      auth-init:
        condition: service_completed_successfully

  nginx:
    image: ${RCP_IMAGE_PREFIX:-ghcr.io/sheldylew/registry-control-plane}-nginx:${RCP_IMAGE_TAG:-release}
    restart: unless-stopped
    user: "101:101"
    ports:
      - "${RCP_HTTP_BIND:-127.0.0.1:8080}:8080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      registry:
        condition: service_started

volumes:
  app-data:
  registry-data:
  auth-private-data:
  auth-public-data:
  registry-config-data:
