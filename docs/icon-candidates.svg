    <text class="sub" x="40" y="337">Bearer tokens, auth challenge flow, and registry access.</text>
  </g>

  <g id="candidate-6" transform="translate(1180 640)" filter="url(#softShadow)">
    <rect class="card" width="500" height="380" rx="28"/>
    <g transform="translate(150 54)">
      <rect x="0" y="0" width="200" height="200" rx="46" fill="#06101D" stroke="#22D3EE" stroke-width="6"/>
      <path d="M44 136C44 105.07 69.07 80 100 80C130.93 80 156 105.07 156 136" stroke="url(#cyanEmerald)" stroke-width="16" stroke-linecap="round"/>
      <path d="M56 136H144" stroke="#E2E8F0" stroke-opacity="0.2" stroke-width="8" stroke-linecap="round"/>
      <path d="M100 136L131 98" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
      <circle cx="100" cy="136" r="12" fill="#F8FAFC"/>
      <path d="M68 54H132C140.84 54 148 61.16 148 70V91C135.37 80.39 118.86 74 100.84 74C82.22 74 65.2 80.82 52 92.1V70C52 61.16 59.16 54 68 54Z" fill="#0B1F2E" stroke="#34D399" stroke-width="8"/>
      <path d="M75 70H125" stroke="#22D3EE" stroke-width="7" stroke-linecap="round"/>
      <path d="M54 155H146" stroke="#CBD5E1" stroke-opacity="0.35" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text class="label" x="40" y="306">6. Ops Gauge</text>
    <text class="sub" x="40" y="337">Maintenance, health, storage pressure, and admin status.</text>
  </g>
</svg>
