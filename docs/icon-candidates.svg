<svg width="1800" height="1200" viewBox="0 0 1800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1800" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111C31"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="cyanEmerald" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="limeGreen" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8FF73"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="blueCyan" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="amberCyan" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000814" flood-opacity="0.42"/>
    </filter>
    <style>
      .card { fill: url(#cardFill); stroke: rgba(255,255,255,0.1); stroke-width: 2; }
      .label { fill: #E2E8F0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 30px; font-weight: 760; letter-spacing: 0; }
      .sub { fill: #94A3B8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 520; letter-spacing: 0; }
      .tiny { fill: #CBD5E1; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0; }
      .rcp { fill: #F8FAFC; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 54px; font-weight: 850; letter-spacing: 0; }
      .mutedStroke { stroke: #94A3B8; stroke-opacity: 0.3; }
      .whiteStroke { stroke: #E2E8F0; stroke-opacity: 0.92; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#pageBg)"/>
  <path d="M150 174H1690M150 996H1690" stroke="#94A3B8" stroke-opacity="0.08" stroke-width="2"/>
  <text x="150" y="105" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="820" letter-spacing="0">Registry Control Plane icon directions</text>
  <text x="150" y="144" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="520" letter-spacing="0">Six vector-friendly candidates for app icon, favicon, docs, and wordmark variants</text>

  <g id="candidate-1" transform="translate(120 210)" filter="url(#softShadow)">
    <rect class="card" width="500" height="380" rx="28"/>
    <g transform="translate(150 54)">
      <rect x="0" y="0" width="200" height="200" rx="46" fill="#06101D" stroke="#C8FF73" stroke-width="6"/>
      <path d="M100 27L164 64V138L100 175L36 138V64L100 27Z" fill="url(#limeGreen)"/>
      <path d="M100 27L164 64L100 101L36 64L100 27Z" fill="#D9FF94" fill-opacity="0.9"/>
      <path d="M36 64L100 101V175L36 138V64Z" fill="#22A33B"/>
      <path d="M164 64L100 101V175L164 138V64Z" fill="#15803D"/>
      <path d="M100 27L164 64V138L100 175L36 138V64L100 27Z" stroke="#F7FFE7" stroke-opacity="0.62" stroke-width="4" stroke-linejoin="round"/>
      <path d="M114 90C114 82.27 107.73 76 100 76C92.27 76 86 82.27 86 90C86 94.5 88.12 98.51 91.42 101.07V106.3L84.68 126.26C83.89 128.6 85.64 131 88.11 131H111.89C114.36 131 116.11 128.6 115.32 126.26L108.58 106.3V101.07C111.88 98.51 114 94.5 114 90Z" fill="#06101D"/>
    </g>
    <text class="label" x="40" y="306">1. Vault Cube</text>
    <text class="sub" x="40" y="337">Closest to the current icon: secured registry storage.</text>
  </g>

  <g id="candidate-2" transform="translate(650 210)" filter="url(#softShadow)">
