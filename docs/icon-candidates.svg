      <path d="M100 28L162 64L100 100L38 64L100 28Z" fill="#22D3EE" fill-opacity="0.13"/>
    </g>
    <text class="label" x="40" y="306">4. RCP Monogram</text>
    <text class="sub" x="40" y="337">Strong for docs, GitHub avatar, and wordmark pairing.</text>
  </g>

  <g id="candidate-5" transform="translate(650 640)" filter="url(#softShadow)">
    <rect class="card" width="500" height="380" rx="28"/>
    <g transform="translate(150 54)">
      <rect x="0" y="0" width="200" height="200" rx="46" fill="#06101D" stroke="#FBBF24" stroke-width="6"/>
      <circle cx="100" cy="100" r="62" fill="#0B1F2E" stroke="url(#amberCyan)" stroke-width="12"/>
      <path d="M100 38C134.24 38 162 65.76 162 100C162 134.24 134.24 162 100 162" stroke="#E2E8F0" stroke-opacity="0.35" stroke-width="8" stroke-linecap="round"/>
      <circle cx="82" cy="97" r="20" fill="#FBBF24"/>
      <path d="M102 97H154M134 97V118M119 97V111" stroke="#F8FAFC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M47 122C57.29 146.11 80.65 162 107 162" stroke="#34D399" stroke-width="8" stroke-linecap="round"/>
      <circle cx="47" cy="122" r="8" fill="#34D399"/>
