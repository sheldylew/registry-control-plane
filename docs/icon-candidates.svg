    <g transform="translate(150 54)">
      <rect x="0" y="0" width="200" height="200" rx="46" fill="#06101D" stroke="#22D3EE" stroke-width="6"/>
      <path d="M100 30L160 65V135L100 170L40 135V65L100 30Z" stroke="url(#cyanEmerald)" stroke-width="12" stroke-linejoin="round"/>
      <circle cx="100" cy="100" r="34" fill="url(#cyanEmerald)"/>
      <circle cx="100" cy="100" r="15" fill="#06101D"/>
      <path d="M100 66V41M100 159V134M66 100H40M160 100H134" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round"/>
      <circle cx="100" cy="41" r="10" fill="#34D399"/>
      <circle cx="100" cy="159" r="10" fill="#22D3EE"/>
      <circle cx="40" cy="100" r="10" fill="#22D3EE"/>
      <circle cx="160" cy="100" r="10" fill="#34D399"/>
    </g>
    <text class="label" x="40" y="306">2. Control Hex</text>
    <text class="sub" x="40" y="337">Best pure mark for control-plane routing and policy.</text>
  </g>

  <g id="candidate-3" transform="translate(1180 210)" filter="url(#softShadow)">
    <rect class="card" width="500" height="380" rx="28"/>
    <g transform="translate(150 54)">
      <rect x="0" y="0" width="200" height="200" rx="46" fill="#06101D" stroke="#38BDF8" stroke-width="6"/>
      <g transform="translate(38 52)">
        <rect x="0" y="0" width="124" height="32" rx="8" fill="#38BDF8"/>
        <rect x="0" y="42" width="124" height="32" rx="8" fill="#2DD4BF"/>
        <rect x="0" y="84" width="124" height="32" rx="8" fill="#34D399"/>
        <path d="M24 16H98M24 58H98M24 100H98" stroke="#06101D" stroke-width="7" stroke-linecap="round"/>
      </g>
      <path d="M136 117L158 139L198 89" stroke="#F8FAFC" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M17 100C17 54.16 54.16 17 100 17C134.24 17 163.63 37.73 176.35 67.31" stroke="#CBD5E1" stroke-opacity="0.34" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text class="label" x="40" y="306">3. Registry Stack</text>
    <text class="sub" x="40" y="337">Readable at small sizes, directly says repository inventory.</text>
  </g>

  <g id="candidate-4" transform="translate(120 640)" filter="url(#softShadow)">
    <rect class="card" width="500" height="380" rx="28"/>
    <g transform="translate(150 54)">
      <rect x="0" y="0" width="200" height="200" rx="46" fill="#06101D" stroke="#34D399" stroke-width="6"/>
      <path d="M100 28L162 64V136L100 172L38 136V64L100 28Z" fill="#0B1F2E" stroke="url(#cyanEmerald)" stroke-width="9" stroke-linejoin="round"/>
      <path d="M62 79H138M62 121H138M100 43V157" stroke="#E2E8F0" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>
